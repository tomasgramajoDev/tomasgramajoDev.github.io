<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autorización recibida</title>
<style>
  body { font-family: system-ui, sans-serif; background:#111; color:#eee; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  main { max-width: 640px; padding: 32px; }
  .ok { color:#53fc18; }
  .err { color:#ff5555; }
  textarea { width:100%; height:90px; background:#222; color:#53fc18; border:1px solid #444; border-radius:8px; padding:10px; font-family:monospace; font-size:13px; }
  button { margin-top:10px; background:#53fc18; color:#111; border:none; border-radius:8px; padding:10px 18px; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>
<main>
  <h1 id="estado">Procesando...</h1>
  <p id="detalle"></p>
  <textarea id="url" readonly></textarea>
  <button onclick="copiar()">Copiar URL</button>
  <p id="copiado"></p>
  <script>
    // Muestra la URL completa (con el ?code=...) para pegarla en tiktok_oauth.py
    const params = new URLSearchParams(window.location.search);
    const urlBox = document.getElementById('url');
    urlBox.value = window.location.href;
    if (params.get('code')) {
      document.getElementById('estado').textContent = 'Autorización OK';
      document.getElementById('estado').className = 'ok';
      document.getElementById('detalle').textContent =
        'Copiá la URL de abajo y pegala en la consola donde corre tiktok_oauth.py.';
    } else if (params.get('error')) {
      document.getElementById('estado').textContent = 'TikTok devolvió un error';
      document.getElementById('estado').className = 'err';
      document.getElementById('detalle').textContent = params.get('error_description') || params.get('error');
    } else {
      document.getElementById('estado').textContent = 'Página de callback';
      document.getElementById('detalle').textContent =
        'Esta página recibe la redirección de TikTok durante la autorización del Clipper.';
    }
    function copiar() {
      urlBox.select();
      navigator.clipboard.writeText(urlBox.value).then(() => {
        document.getElementById('copiado').textContent = 'Copiada al portapapeles.';
      });
    }
  </script>
</main>
</body>
</html>
